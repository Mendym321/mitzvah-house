<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Mitzvah House Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --r:#C9705A;--rd:#A85A45;--rl:#FBF0EC;--rm:#F0C4B4;
  --w:#FFFFFF;--f:#F7F3EE;--f2:#EFE9E1;--f3:#E4DCD2;--f4:#D0C6BA;
  --k:#1C1410;--k2:#3E342A;--k3:#7A6A5C;--k4:#B0A090;
  --serif:'Fraunces',Georgia,serif;
  --sans:'DM Sans',-apple-system,sans-serif;
}
html,body{height:100%;font-family:var(--sans);color:var(--k);background:var(--f);-webkit-font-smoothing:antialiased;}
body{overflow-x:hidden;}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--k);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .8s ease,visibility .8s;}
#splash.gone{opacity:0;visibility:hidden;}
.sp-flame{margin-bottom:20px;animation:breathe 3s ease-in-out infinite;}
@keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.06)}}
.sp-title{font-family:var(--serif);font-size:24px;font-weight:400;color:var(--w);letter-spacing:.02em;margin-bottom:6px;}
.sp-title em{font-style:italic;color:var(--rm);}
.sp-sub{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.14em;text-transform:uppercase;}
.sp-line{width:48px;height:1px;background:rgba(255,255,255,.15);margin:28px auto 0;position:relative;overflow:hidden;}
.sp-line::after{content:'';position:absolute;inset:0;background:var(--rm);transform:translateX(-100%);animation:slide 1.6s ease forwards .3s;}
@keyframes slide{to{transform:translateX(0)}}

/* ── TOP NAV ── */
#nav{background:var(--w);border-bottom:1px solid var(--f3);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:1080px;margin:0 auto;padding:0 24px;display:flex;align-items:center;height:56px;gap:0;}
.nav-brand{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--k);letter-spacing:.01em;margin-right:36px;flex-shrink:0;white-space:nowrap;}
.nav-brand em{font-style:italic;color:var(--r);}
.nav-tabs{display:flex;gap:2px;flex:1;}
.nt{padding:7px 14px;border-radius:8px;font-size:13.5px;font-weight:500;color:var(--k3);cursor:pointer;transition:all .12s;border:none;background:none;font-family:var(--sans);white-space:nowrap;}
.nt:hover{background:var(--f);color:var(--k2);}
.nt.on{background:var(--rl);color:var(--r);font-weight:600;}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;}


/* ── LAYOUT ── */
#wrap{max-width:1080px;margin:0 auto;padding:32px 24px;}
.page{display:none;}.page.on{display:block;animation:up .2s ease;}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .13s;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn svg{width:14px;height:14px;}
.btn-r{background:var(--r);color:var(--w);padding:10px 20px;border-radius:100px;font-size:13.5px;}.btn-r:hover{background:var(--rd);}
.btn-k{background:var(--k);color:var(--w);padding:10px 20px;border-radius:100px;font-size:13.5px;}.btn-k:hover{background:var(--k2);}
.btn-o{background:transparent;color:var(--k3);padding:10px 18px;border-radius:100px;font-size:13.5px;border:1.5px solid var(--f3);}.btn-o:hover{background:var(--f2);border-color:var(--f4);}
.btn-sm{padding:7px 14px;font-size:12.5px;border-radius:100px;}

/* ── FORMS ── */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.label{font-size:12px;font-weight:600;color:var(--k3);letter-spacing:.02em;}
.inp{width:100%;padding:11px 14px;border:1.5px solid var(--f3);border-radius:10px;font-family:var(--sans);font-size:14px;color:var(--k);background:var(--w);outline:none;transition:border .12s;}
.inp:focus{border-color:var(--r);}
.inp::placeholder{color:var(--k4);}
textarea.inp{resize:none;line-height:1.65;}
select.inp{cursor:pointer;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── TAGS ── */
.tagfield{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:8px 10px;border:1.5px solid var(--f3);border-radius:10px;background:var(--w);cursor:text;min-height:44px;transition:border .12s;}
.tagfield:focus-within{border-color:var(--r);}
.taginput{border:none;outline:none;font-family:var(--sans);font-size:13px;color:var(--k);background:none;min-width:80px;flex:1;}
.taginput::placeholder{color:var(--k4);}
.tagpill{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.tagpill.rm{cursor:pointer;}
.tagsug{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.tsug{padding:4px 12px;border-radius:20px;border:1px dashed var(--f4);font-size:12px;color:var(--k4);cursor:pointer;transition:all .11s;font-family:var(--sans);}
.tsug:hover{border-color:var(--r);color:var(--r);background:var(--rl);}

/* ── HOME ── */
.home-head{margin-bottom:36px;padding:44px 0 38px;border-bottom:1px solid var(--f3);position:relative;overflow:hidden;}
.home-flame{position:absolute;right:0;top:50%;transform:translateY(-50%);opacity:.06;pointer-events:none;}
.home-eyebrow{font-size:11px;font-weight:500;color:var(--k4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;}
.home-greeting{font-family:var(--serif);font-size:48px;font-weight:400;line-height:1;color:var(--k);margin-bottom:10px;}
.home-greeting em{font-style:italic;color:var(--r);}
.home-tagline{font-size:16px;color:var(--k3);line-height:1.7;max-width:400px;font-weight:300;}
.home-sub{font-size:13px;color:var(--k4);line-height:1.7;max-width:420px;margin-top:8px;}

/* IMPORT CARDS */
.import-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.icard{background:var(--w);border:1.5px solid var(--f3);border-radius:16px;padding:22px;cursor:pointer;transition:all .16s;position:relative;}
.icard:hover{border-color:var(--rm);transform:translateY(-2px);box-shadow:0 8px 28px rgba(28,20,16,.08);}
.icard.primary{background:var(--rl);border-color:var(--rm);}
.icard.primary:hover{border-color:var(--rm);}
.ic-icon{font-size:26px;margin-bottom:12px;display:block;}
.ic-title{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--k);margin-bottom:5px;line-height:1.2;}
.icard.primary .ic-title{color:var(--k);}
.ic-sub{font-size:13px;color:var(--k3);line-height:1.6;}
.icard.primary .ic-sub{color:var(--k3);}
.ic-best{position:absolute;top:14px;right:14px;font-size:10px;font-weight:700;background:var(--r);color:var(--w);padding:2px 8px;border-radius:20px;letter-spacing:.03em;}
.home-or{text-align:center;font-size:13px;color:var(--k4);padding:4px 0 10px;}
.home-manual{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--w);border:1px solid var(--f3);border-radius:12px;cursor:pointer;transition:background .12s;}
.home-manual:hover{background:var(--f2);}
.home-manual-text{font-size:14px;color:var(--k3);flex:1;}
.home-manual svg{color:var(--k4);}

/* STATS (when data exists) */
.stat-bar{display:flex;gap:32px;margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--f3);}
.sbar-item{}
.sbar-n{font-family:var(--serif);font-size:48px;font-weight:400;color:var(--r);line-height:1;}
.sbar-l{font-size:12px;color:var(--k4);font-weight:500;margin-top:4px;letter-spacing:.03em;}

/* UPCOMING */
.section{margin-bottom:40px;}
.section-label{font-size:11px;font-weight:700;color:var(--k4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;}
.ev-cards{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
.ev-cards::-webkit-scrollbar{height:0;}
.evc{background:var(--w);border:1px solid var(--f3);border-radius:14px;padding:18px;min-width:200px;flex-shrink:0;cursor:pointer;transition:all .14s;}
.evc:hover{border-color:var(--rm);box-shadow:0 4px 18px rgba(28,20,16,.07);}
.evc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.evc-date{font-family:var(--serif);font-size:32px;font-weight:400;color:var(--k);line-height:1;}
.evc-mo{font-size:11px;font-weight:600;color:var(--k4);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.evc-dot{width:8px;height:8px;border-radius:50%;background:var(--r);}
.evc-name{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--k);margin-bottom:6px;line-height:1.3;}
.evc-cnt{font-size:12.5px;color:var(--k3);}

/* ACTIVITY */
.activity-list{display:flex;flex-direction:column;gap:0;}
.act-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--f2);}
.act-item:last-child{border-bottom:none;}
.act-dot{width:8px;height:8px;border-radius:50%;background:var(--r);flex-shrink:0;}
.act-text{flex:1;font-size:14px;color:var(--k2);line-height:1.5;}
.act-time{font-size:12px;color:var(--k4);}

/* ── EVENT CATEGORIES ── */
.ev-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:2px;}
.evrow-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0;}
.evrow{position:relative;}

/* ── EVENTS PAGE ── */
.page-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;}
.page-title{font-family:var(--serif);font-size:38px;font-weight:400;color:var(--k);}
.page-title em{font-style:italic;color:var(--r);}
.evlist{display:flex;flex-direction:column;gap:0;}
.evrow{display:flex;align-items:center;gap:18px;padding:18px 0;border-bottom:1px solid var(--f2);cursor:pointer;transition:background .1s;}
.evrow:hover .evrow-name{color:var(--r);}
.evrow-dt{width:56px;flex-shrink:0;text-align:center;}
.evrow-day{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--k);line-height:1;}
.evrow-mo{font-size:10px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.06em;}
.evrow-info{flex:1;min-width:0;}
.evrow-name{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--k);transition:color .12s;margin-bottom:3px;}
.evrow-meta{font-size:13px;color:var(--k3);}
.evrow-right{text-align:right;flex-shrink:0;}
.evrow-cnt{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--r);line-height:1;}
.evrow-clabel{font-size:11px;color:var(--k4);}
.ev-section-title{font-size:11px;font-weight:700;color:var(--k4);letter-spacing:.1em;text-transform:uppercase;padding:20px 0 10px;}

/* ── MEMBERS PAGE ── */
.members-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;max-width:280px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--k4);}
.searchinp{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--f3);border-radius:100px;font-family:var(--sans);font-size:13.5px;color:var(--k);background:var(--w);outline:none;transition:border .12s;}
.searchinp:focus{border-color:var(--r);}
.searchinp::placeholder{color:var(--k4);}
.filtchip{padding:7px 14px;border-radius:100px;border:1.5px solid var(--f3);background:var(--w);font-family:var(--sans);font-size:13px;font-weight:500;color:var(--k3);cursor:pointer;transition:all .12s;}
.filtchip.on{background:var(--r);color:var(--w);border-color:var(--r);}
.m-count{margin-left:auto;font-size:13px;color:var(--k4);}

.mlist{display:flex;flex-direction:column;gap:0;}
.mrow{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--f2);cursor:pointer;transition:all .12s;}
.mrow:hover .mrow-name{color:var(--r);}
.mav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;font-weight:600;color:var(--w);flex-shrink:0;}
.mrow-info{flex:1;min-width:0;}
.mrow-name{font-family:var(--serif);font-size:17px;font-weight:400;color:var(--k);transition:color .12s;margin-bottom:4px;}
.mrow-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mrow-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
.mrow-detail{font-size:12.5px;color:var(--k3);}
.mrow-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}

/* ── CHECK-IN STRIP ── */
.checkin-strip{margin-bottom:32px;padding:20px 24px;background:var(--w);border:1px solid var(--f3);border-radius:16px;}
.checkin-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;}
.checkin-title{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--k);}
.checkin-sub{font-size:13px;color:var(--k4);}
.checkin-list{display:flex;flex-direction:column;gap:0;}
.ci-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--f2);}
.ci-row:last-child{border-bottom:none;}
.ci-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:14px;font-weight:600;color:var(--w);flex-shrink:0;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-family:var(--serif);font-size:15px;font-weight:400;color:var(--k);margin-bottom:2px;}
.ci-since{font-size:12.5px;color:var(--k4);}
.ci-wa{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:var(--f);border:1px solid var(--f3);color:var(--k3);cursor:pointer;text-decoration:none;flex-shrink:0;font-size:15px;transition:all .13s;}
.ci-wa:hover{background:#25d366;border-color:#25d366;color:var(--w);}

/* ── ANALYTICS PAGE ── */
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.an-card{background:var(--w);border:1px solid var(--f3);border-radius:18px;padding:0;overflow:hidden;}
.an-card-head{padding:20px 22px 16px;border-bottom:1px solid var(--f2);}
.an-card-eyebrow{font-size:10px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.an-card-title{font-family:var(--serif);font-size:20px;font-weight:400;color:var(--k);}
.an-card-body{padding:18px 22px 20px;}
.an-hero-stat{font-family:var(--serif);font-size:56px;font-weight:400;line-height:1;margin-bottom:4px;}
.an-hero-label{font-size:12px;color:var(--k4);font-weight:500;}
.an-bars{display:flex;flex-direction:column;gap:14px;}
.an-bar-row{display:flex;align-items:center;gap:12px;}
.an-bar-lbl{font-size:13px;color:var(--k2);min-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.an-bar-track{flex:1;height:3px;background:var(--f2);border-radius:2px;overflow:hidden;}
.an-bar-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.16,1,.3,1);}
.an-bar-val{font-family:var(--serif);font-size:16px;color:var(--k3);min-width:20px;text-align:right;}
.an-empty{font-size:14px;color:var(--k4);padding:8px 0;font-style:italic;}

/* ── DRAWERS (right panel) ── */
.overlay{position:fixed;inset:0;background:rgba(28,20,16,.15);z-index:400;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.on{opacity:1;pointer-events:all;}
.drawer{position:fixed;right:0;top:0;bottom:0;width:480px;max-width:100vw;background:var(--w);border-left:1px solid var(--f3);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);z-index:401;box-shadow:-8px 0 32px rgba(28,20,16,.08);}
.overlay.on .drawer{transform:translateX(0);}
.dw-head{padding:22px 22px 0;border-bottom:1px solid var(--f2);flex-shrink:0;}
.dw-eyebrow{font-size:11px;font-weight:600;color:var(--k4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.dw-title{font-family:var(--serif);font-size:26px;font-weight:400;color:var(--k);margin-bottom:14px;line-height:1.2;}
.dw-title em{font-style:italic;color:var(--r);}
.dw-tabs{display:flex;gap:0;}
.dwt{padding:10px 16px;font-size:13px;font-weight:600;color:var(--k4);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;}
.dwt.on{color:var(--r);border-bottom-color:var(--r);}
.dw-body{flex:1;overflow-y:auto;padding:22px;}
.dw-body::-webkit-scrollbar{width:3px;}
.dw-body::-webkit-scrollbar-thumb{background:var(--f3);}
.dw-foot{padding:16px 22px;border-top:1px solid var(--f2);display:flex;gap:8px;flex-shrink:0;}
.dw-foot .btn{flex:1;}
.dw-x{width:30px;height:30px;border-radius:50%;border:1px solid var(--f3);background:var(--w);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--k4);flex-shrink:0;}
.dw-x:hover{background:var(--f2);}

/* MEMBER DRAWER INFO */
.dw-ir{display:flex;gap:10px;margin-bottom:10px;align-items:baseline;}
.dw-irl{font-size:13px;color:var(--k4);min-width:96px;flex-shrink:0;}
.dw-irv{font-size:13px;color:var(--k2);line-height:1.55;}
.dw-section{margin-bottom:22px;}
.dw-section-title{font-size:10.5px;font-weight:700;color:var(--k4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px;}
.hist-item{display:flex;gap:12px;padding-bottom:12px;position:relative;}
.hist-item:not(:last-child)::before{content:'';position:absolute;left:4px;top:10px;bottom:0;width:1px;background:var(--f2);}
.hist-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;background:var(--rl);border:2px solid var(--rm);}
.hist-name{font-family:var(--serif);font-size:14px;font-weight:400;color:var(--k);}
.hist-date{font-size:12px;color:var(--k4);margin-top:2px;}

/* EVENT DRAWER */
.rsvp-count-row{display:flex;gap:10px;margin-bottom:16px;}
.rsvp-box{flex:1;background:var(--f);border-radius:10px;padding:12px;text-align:center;}
.rsvp-n{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--k);}
.rsvp-l{font-size:11px;color:var(--k4);font-weight:500;margin-top:3px;}
.rsvp-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--f2);}
.rsvp-item:last-child{border-bottom:none;}
.rsvp-toggle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;transition:all .12s;}
.rsvp-conf{background:rgba(45,122,79,.1);color:#2d7a4f;}
.rsvp-pend{background:var(--f2);color:var(--k4);}

/* ── MODALS ── */
.modal-bg{position:fixed;inset:0;background:rgba(28,20,16,.2);z-index:600;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .16s;}
.modal-bg.on{opacity:1;pointer-events:all;}
.modal{background:var(--w);border-radius:22px 22px 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;transform:translateY(12px);transition:transform .2s;padding-bottom:env(safe-area-inset-bottom);}
.modal-bg.on .modal{transform:translateY(0);}
.modal-handle{width:38px;height:4px;background:var(--f3);border-radius:2px;margin:13px auto 0;}
.modal-head{padding:16px 20px 13px;border-bottom:1px solid var(--f2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--w);z-index:1;}
.modal-title{font-family:var(--serif);font-size:20px;font-weight:400;color:var(--k);}
.modal-x{width:28px;height:28px;border-radius:50%;background:var(--f2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--k3);}
.modal-x svg{width:11px;height:11px;}
.modal-body{padding:18px 20px 20px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding-top:14px;border-top:1px solid var(--f2);margin-top:6px;}

/* DROP ZONE */
.dropzone{border:2px dashed var(--f3);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--w);}
.dropzone:hover,.dropzone.over{border-color:var(--r);background:var(--rl);}
.dz-icon{font-size:36px;margin-bottom:12px;}
.dz-title{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--k2);margin-bottom:5px;}
.dz-sub{font-size:13px;color:var(--k4);line-height:1.65;}
.dz-or{font-size:13px;color:var(--k4);text-align:center;padding:12px 0 10px;}

/* REVIEW TABLE */
.rtable{width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:14px;}
.rtable thead th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--k4);border-bottom:1.5px solid var(--f3);}
.rtable tbody td{padding:9px 10px;border-bottom:1px solid var(--f2);vertical-align:middle;}
.rtable tbody tr:hover td{background:var(--rl);}
.rtable tbody tr.isnew td:first-child{border-left:2.5px solid var(--r);}
.rtable tbody tr.isex td:first-child{border-left:2.5px solid #2d7a4f;}
.rinput{width:100%;border:none;outline:none;font-family:var(--sans);font-size:13.5px;color:var(--k);background:none;padding:1px 0;}
.rinput:focus{border-bottom:1.5px solid var(--r);}
.rbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;margin-top:4px;display:inline-block;}
.rbadge.n{background:var(--rl);color:var(--r);}
.rbadge.e{background:rgba(45,122,79,.1);color:#2d7a4f;}
.rtags-cell{display:flex;flex-wrap:wrap;gap:3px;align-items:center;}
.radd-tag{font-size:11px;color:var(--k4);border:1px dashed var(--f4);border-radius:20px;padding:2px 8px;cursor:pointer;white-space:nowrap;transition:all .11s;}
.radd-tag:hover{color:var(--r);border-color:var(--r);}
.rdel{width:24px;height:24px;border-radius:50%;border:none;background:none;cursor:pointer;color:var(--k4);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .11s;}
.rdel:hover{background:var(--rl);color:var(--r);}

/* REVIEW SUMMARY */
.review-summary{background:var(--f);border-radius:11px;padding:14px 16px;margin-bottom:14px;display:flex;gap:20px;}
.rs-n{font-family:var(--serif);font-size:26px;font-weight:400;color:var(--k);}
.rs-l{font-size:11px;color:var(--k4);font-weight:500;margin-top:2px;}

/* MOBILE BOTTOM NAV */
#bnav{display:none !important;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--k);color:var(--f);font-size:13.5px;font-weight:500;padding:11px 22px;border-radius:100px;z-index:999;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MERGE / SELECT UI ── */
.merge-bar{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--k);color:var(--f);padding:12px 20px;border-radius:100px;display:none;align-items:center;gap:12px;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,.2);white-space:nowrap;}
.merge-bar.on{display:flex;}
.merge-bar-text{font-size:13px;font-weight:500;}
.merge-bar-btn{background:var(--r);color:#fff;border:none;border-radius:100px;padding:6px 14px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.merge-bar-cancel{background:rgba(255,255,255,.12);color:var(--f);border:none;border-radius:100px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--sans);}
.mrow-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--f3);background:var(--w);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .13s;cursor:pointer;}
.mrow-check.on{background:var(--r);border-color:var(--r);color:#fff;}
.mrow.selecting{cursor:default;}

/* ── ATTENDANCE SELECT-ALL ── */
.att-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--f2);}
.att-sel-btn{padding:5px 13px;border-radius:100px;border:1.5px solid var(--f3);background:var(--w);font-size:12.5px;font-weight:600;color:var(--k3);cursor:pointer;font-family:var(--sans);transition:all .12s;}
.att-sel-btn:hover{border-color:var(--r);color:var(--r);}
.att-sel-btn.all-selected{background:var(--r);border-color:var(--r);color:#fff;}
.att-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--f2);cursor:pointer;}
.att-item:last-child{border-bottom:none;}
.att-item:hover .att-check{border-color:var(--r);}
.att-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--f3);background:var(--w);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .13s;}
.att-check.on{background:#2d7a4f;border-color:#2d7a4f;color:#fff;}

/* EMPTY STATE */
.empty-state{padding:60px 0;text-align:center;}
.es-icon{font-size:40px;margin-bottom:16px;opacity:.25;}
.es-title{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--k2);margin-bottom:8px;}
.es-sub{font-size:14px;color:var(--k4);line-height:1.7;max-width:280px;margin:0 auto 22px;}

/* ── MOBILE ── */
@media(max-width:700px){

  #wrap{padding:0 0 90px;}

  .evrow{padding:16px 20px;}

  /* Members */

  /* Analytics */

  .an-card{border-radius:0;border-left:none;border-right:none;border-top:none;}
  .an-card:first-child{border-top:1px solid var(--f3);}

  /* Activity */

  .act-item{padding:16px 0;}

  /* Import table */

}
</style>

function detectGender(firstName) {
  if (!firstName) return '';
  const n = firstName.toLowerCase().trim();
  if (FEMALE_NAMES.has(n)) return 'f';
  if (MALE_NAMES.has(n)) return 'm';
  // Heuristic fallbacks for Hebrew/Brazilian patterns
  if (n.endsWith('a') && !['joshua','luca','noah','elisha'].includes(n)) return 'f';
  if (n.endsWith('ah') && !['judah','isaiah','jeremiah','nehemiah','zechariah'].includes(n)) return 'f';
  if (n.endsWith('it') || n.endsWith('el') || n.endsWith('on')) return 'm';
  return ''; // unknown
}

// ── SMART PARSER ──────────────────────────────────────────────────────
function parseCSV(raw) {
  if (!raw?.trim()) { toast('Paste data first'); return; }
  const lines = raw.trim().split(/\r?\n/).filter(Boolean);
  if (lines.length < 2) { toast('Not enough data'); return; }
  const headers = splitLine(lines[0]);
  const rows = lines.slice(1).map(splitLine);
  // Smart column detection
  const map = {};
  const match = (hl, keys) => keys.some(k => hl.includes(k));
  headers.forEach((h, i) => {
    const hl = h.toLowerCase().trim();
    if (map.fullname == null && match(hl, ['name','nome','full','participant','attendee','inscrito','participante'])) map.fullname = i;
    if (map.fname == null && (hl === 'first name' || hl === 'nome' || hl === 'primeiro nome' || hl === 'first')) map.fname = i;
    if (map.lname == null && (hl === 'last name' || hl === 'sobrenome' || hl === 'surname' || hl === 'last')) map.lname = i;
    if (map.age == null && match(hl, ['age','idade','anos','birth'])) map.age = i;
    if (map.phone == null && match(hl, ['phone','tel','whatsapp','celular','mobile','fone'])) map.phone = i;
    if (map.email == null && match(hl, ['email','e-mail','mail','correio'])) map.email = i;
    if (map.hood == null && match(hl, ['neighborhood','bairro','district','cidade','city','region','região','bairro'])) map.hood = i;
  });
  const people = rows.map(row => {
    if (row.every(c => !c?.trim())) return null;
    let fn = '', ln = '';
    if (map.fullname != null) { const pts = (row[map.fullname] || '').trim().split(/\s+/); fn = pts[0] || ''; ln = pts.slice(1).join(' '); }
    if (map.fname != null) fn = (row[map.fname] || '').trim() || fn;
    if (map.lname != null) ln = (row[map.lname] || '').trim() || ln;
    if (!fn && !ln) return null;
    const existing = M.find(m => m.fn.toLowerCase() === fn.toLowerCase() && m.ln.toLowerCase() === ln.toLowerCase());
    return { fn, ln, age: parseInt(row[map.age]) || null, gender: detectGender(fn), ph: (row[map.phone] || '').trim(), em: (row[map.email] || '').trim(), bairro: (row[map.hood] || '').trim(), is_new: !existing, eid: existing?.id };
  }).filter(Boolean);
  if (!people.length) { toast('No people found'); return; }
  importParsed = people;
  renderReview(map, headers);
}
function splitLine(line) {
  const r = []; let c = '', q = false;
  for (const ch of line) { if (ch === '"') q = !q; else if (ch === ',' && !q) { r.push(c.trim()); c = ''; } else c += ch; }
  r.push(c.trim()); return r;
}

  let added = 0;

  } else if (evSel?.value) {

  }
  for (let i = 0; i < importParsed.length; i++) {

      continue;
    }
    const nm = { id: (Date.now()+i).toString(), fn: p.fn, ln: p.ln, age: p.age, tags: p.tags||[], ph: p.ph, em: p.em, bairro: p.bairro, notes: '', joined: today(), attendees: [] };
    M.push(nm); fbSaveMember(nm);
    if (ev) { if (!ev.rsvp) ev.rsvp = []; ev.rsvp.push({ mid: nm.id, status: 'confirmed' }); }
    added++;
  }
  if (ev) fbSaveEvent(ev);
  save(); closeModal('imp-modal'); importParsed = []; importForEvId = null;
  toast(`${added} new members added!`);
  renderCurrent();
}

async function toggleAttendance(evId, mid) {
  const ev = EV.find(e => String(e.id) === String(evId)); if (!ev) return;
  if (!ev.attendees) ev.attendees = [];
  const idx = ev.attendees.map(String).indexOf(String(mid));
  if (idx > -1) ev.attendees.splice(idx, 1);
  else ev.attendees.push(mid);
  save(); fbSaveEvent(ev); renderEvBody(ev);
}
async function toggleSelectAll(evId) {
  const ev = EV.find(e => String(e.id) === String(evId)); if (!ev) return;
  const candidates = [...new Set([...(ev.rsvp||[]).map(r=>String(r.mid)),...(ev.attendees||[]).map(String)])];
  const allSel = candidates.every(id => (ev.attendees||[]).map(String).includes(id));
  ev.attendees = allSel ? [] : [...candidates];
  save(); fbSaveEvent(ev); renderEvBody(ev);
}

function cycleRSVP(evId, mid) { const ev = EV.find(e => String(e.id) === String(evId)); if (!ev) return; const r = ev.rsvp?.find(x => x.mid === mid); if (!r) return; r.status = r.status === 'confirmed' ? 'pending' : 'confirmed'; save(); renderEvDwTab(ev); }

  // ── Lapsed: attended 2+ events but gone 60+ days ──

  })).filter(x => x.n > 0).sort((a,b) => b.n-a.n).slice(0,7);

  // ── Best events ──

    <div style="background:var(--w);border:1px solid var(--f3);border-radius:16px;overflow:hidden;${fullWidth?'grid-column:1/-1':''}">
      <div style="padding:16px 20px 12px;border-bottom:1px solid var(--f2)">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--k4);margin-bottom:3px">${eyebrow}</div>
        <div style="font-family:var(--serif);font-size:18px;color:var(--k)">${title}</div>
      </div>
      <div style="padding:4px 20px 16px">${body}</div>
    </div>`;

  // ── Overview card ──
  const overviewBody = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);text-align:center;padding:14px 0;gap:0">
      ${[
        [M.length,'Members','var(--r)'],
        [EV.length,'Events','var(--k2)'],
        [avgAtt,'Avg/event','#2d7a4f'],
        [showRate+'%','Show rate','#7b5ea7'],
      ].map(([n,l,c],i) => `
        <div style="${i>0?'border-left:1px solid var(--f2)':''}">
          <div style="font-family:var(--serif);font-size:38px;font-weight:400;color:${c};line-height:1">${n}</div>
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--k4);margin-top:5px">${l}</div>
        </div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;padding:10px 0;border-top:1px solid var(--f2);gap:0">
      ${[
        [regulars.length,'Regulars','#2D4B73'],
        [lapsed.length,'Lapsed','var(--r)'],
        [newLast30>0?'+'+newLast30:'—','New (30d)','#2d7a4f'],
      ].map(([n,l,c],i) => `
        <div style="${i>0?'border-left:1px solid var(--f2)':''}">
          <div style="font-family:var(--serif);font-size:26px;font-weight:400;color:${c};line-height:1">${n}</div>
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--k4);margin-top:4px">${l}</div>
        </div>`).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:6px;padding:10px 0;border-top:1px solid var(--f2)">
      <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--k4);margin-right:4px">Gender</div>
      ${females.length ? `<div style="display:flex;align-items:center;gap:4px;margin-right:10px"><span style="width:8px;height:8px;border-radius:50%;background:#be185d;display:inline-block"></span><span style="font-size:13px;color:var(--k2)">${females.length} F</span></div>` : ''}
      ${males.length ? `<div style="display:flex;align-items:center;gap:4px;margin-right:10px"><span style="width:8px;height:8px;border-radius:50%;background:#2D4B73;display:inline-block"></span><span style="font-size:13px;color:var(--k2)">${males.length} M</span></div>` : ''}
      ${unknown.length ? `<div style="font-size:12px;color:var(--k4)">${unknown.length} unknown</div>` : ''}
      <div style="flex:1;height:6px;background:var(--f2);border-radius:3px;overflow:hidden;margin-left:8px;display:flex">
        ${females.length ? `<div style="height:100%;background:#be185d;width:${Math.round(females.length/M.length*100)}%"></div>` : ''}
        ${males.length ? `<div style="height:100%;background:#2D4B73;width:${Math.round(males.length/M.length*100)}%"></div>` : ''}
      </div>
    </div>`;

  // ── Lapsed card ──
  const lapsedBody = lapsed.length ? lapsed.slice(0,6).map(({m,last,since}) => {
    const sinceStr = since>=60?Math.floor(since/30)+'mo':since+'d';
    const wa = m.ph?`https://wa.me/55${m.ph.replace(/[^0-9]/g,'')}`:'';
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--f2)">
      <div class="mav" style="width:32px;height:32px;font-size:12px;background:${avatarBg(m)};cursor:pointer" onclick="window.openMemberDrawer('${m.id}')">${initials(m)}</div>
      <div style="flex:1;cursor:pointer;min-width:0" onclick="window.openMemberDrawer('${m.id}')">
        <div style="font-size:13.5px;color:var(--k);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.fn} ${m.ln}</div>
        <div style="font-size:11.5px;color:var(--k4)">${last?fmtShort(last):'Long ago'} · ${sinceStr} ago</div>
      </div>
      ${wa?`<a href="${wa}" target="_blank" class="ci-wa" style="font-size:14px">💬</a>`:''}
    </div>`;
  }).join('') : nd;

  // ── By category ──
  const catBody = Object.keys(catData).length ? Object.entries(catData)
    .sort((a,b)=>b[1].att-a[1].att)
    .map(([cat,d]) => {
      const ci = catInfo({cat});
      const rate = d.rsvp ? Math.round(d.att/d.rsvp*100) : 0;
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--f2)">
        <div style="width:8px;height:8px;border-radius:50%;background:${ci.color};flex-shrink:0"></div>
        <div style="flex:1;font-size:13.5px;color:var(--k);font-weight:500">${ci.label}</div>
        <div style="font-size:12px;color:var(--k4)">${d.ev} event${d.ev>1?'s':''}</div>
        <div style="font-size:12px;color:var(--k4)">${d.att} attended</div>
        <div style="font-size:13px;font-weight:600;color:${ci.color};width:36px;text-align:right">${rate}%</div>
      </div>`;
    }).join('') : nd;

  grid.innerHTML = `
    ${card('Overview','Community at a glance',overviewBody,true)}
    ${card('Lapsed members','Attended before · gone 60+ days',lapsedBody)}
    ${card('Most present','Your regulars',topPeople.length ?
      topPeople.map(({m,n}) => bar(m.fn+' '+m.ln,n,maxP,'#C9705A',
        n+' event'+(n>1?'s':''), `window.openMemberDrawer('${m.id}')`)).join('') : nd)}
    ${card('Best attended','Events by headcount',bestEv.length ?
      bestEv.map(e => {
        const ci=catInfo(e);
        return bar(e.nm,(e.attendees||[]).length,maxEv,ci.color,
          fmtShort(e.dt)+' · '+ci.label,`window.openEventDrawer('${e.id}')`);
      }).join('') : nd)}
    ${card('By category','Attendance rate per program type',catBody)}
    ${card('Growth','New members by month',monthData.length ?
      monthData.map(([k,n]) => {
        const mo = MONTHS[parseInt(k.slice(5))-1];
        return bar(mo+' '+k.slice(0,4),n,maxM,'#2D4B73',n+' new');
      }).join('') : nd)}
  `;
}



// ── DELETE EVENT ──────────────────────────────────────────────────────
async function deleteEvent() {
  const ev = EV.find(e => String(e.id) === String(activeEvId)); if (!ev) return;
  if (!confirm(`Delete "${ev.nm}"? This cannot be undone.`)) return;
  EV = EV.filter(e => String(e.id) !== String(activeEvId));
  save(); fbDeleteEvent(String(activeEvId));
  closeDrawer('ev-ov'); toast('Event deleted'); renderCurrent();
}

// ── DRAWERS & MODALS ───────────────────────────────────────────────────
function openDrawer(id) { document.getElementById(id)?.classList.add('on'); }
function closeDrawer(id) { document.getElementById(id)?.classList.remove('on'); }
function mayCloseDrawer(id, e) { if (e.target.id === id) closeDrawer(id); }
function openModal(id) {
  document.getElementById(id)?.classList.add('on');
  if (id === 'addm') { amTags = []; setTimeout(() => { renderAmTags(); applyStrings(); }, 30); }
}
function closeModal(id) { document.getElementById(id)?.classList.remove('on'); }
function mayCloseModal(id, e) { if (e.target.id === id) closeModal(id); }

// ── EMPTY STATE ────────────────────────────────────────────────────────
function emptyState(title, sub, action) {
  const id = 'es-' + Math.random().toString(36).slice(2);
  setTimeout(() => { const btn = document.getElementById(id); if (btn) btn.onclick = action; }, 10);
  return `<div class="empty-state"><div class="es-icon">✦</div><div class="es-title">${title}</div><div class="es-sub">${sub}</div><button class="btn btn-r" id="${id}">${'Import data'}</button></div>`;
}

// ── TOAST ──────────────────────────────────────────────────────────────
function toast(msg, dur = 2600) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('on'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('on'), dur); }

// ── EDIT MEMBER ──────────────────────────────────────────────────────
let emTags = [];
function editMember() {
  const m = M.find(x => String(x.id) === String(activeMid)); if (!m) return;
  emTags = [...(m.tags||[])];
  document.getElementById('em-fn').value = m.fn||'';
  document.getElementById('em-ln').value = m.ln||'';
  document.getElementById('em-age').value = m.age||'';
  document.getElementById('em-bairro').value = m.bairro||'';
  document.getElementById('em-ph').value = m.ph||'';
  document.getElementById('em-em').value = m.em||'';
  document.getElementById('em-notes').value = m.notes||'';
  renderEmTags();
  openModal('editm');
}
function renderEmTags() {
  const field = document.getElementById('em-tagfield');
  const inp = document.getElementById('em-taginput');
  if (!field||!inp) return;
  field.querySelectorAll('.tagpill').forEach(p=>p.remove());
  emTags.forEach(tag => {
    const span = document.createElement('span');
    const c = tagColor(tag);
    span.className = 'tagpill rm';
    span.style.cssText = `background:${c}15;color:${c};border:1px solid ${c}28;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;`;
    span.innerHTML = `${tag} <span style="opacity:.6">×</span>`;
    span.onclick = () => { emTags = emTags.filter(x=>x!==tag); renderEmTags(); };
    field.insertBefore(span, inp);
  });
  const sug = document.getElementById('em-tagsug');
  if (sug) sug.innerHTML = allTags().filter(t=>!emTags.includes(t)).slice(0,6).map(t=>`<span class="tsug" onclick="emTags.push('${t.replace(/'/g,"\'")}');renderEmTags()">${t}</span>`).join('');
}
async function saveMemberEdit() {
  const m = M.find(x => String(x.id) === String(activeMid)); if (!m) return;
  m.fn = document.getElementById('em-fn').value.trim()||m.fn;
  m.ln = document.getElementById('em-ln').value.trim()||m.ln;
  m.age = parseInt(document.getElementById('em-age').value)||null;
  m.bairro = document.getElementById('em-bairro').value.trim();
  m.ph = document.getElementById('em-ph').value.trim();
  m.em = document.getElementById('em-em').value.trim();
  m.notes = document.getElementById('em-notes').value.trim();
  m.gender = document.getElementById('em-gender')?.value || m.gender || '';
  save(); fbSaveMember(m);
  closeModal('editm'); closeDrawer('m-ov');
  toast('Changes saved'); renderCurrent();
}

// ── DELETE MEMBER ─────────────────────────────────────────────────────
async function deleteMember() {
  const m = M.find(x => String(x.id) === String(activeMid)); if (!m) return;
  if (!confirm(`Delete ${m.fn} ${m.ln}? This cannot be undone.`)) return;
  M = M.filter(x => x.id !== activeMid);
  EV.forEach(ev => {
    ev.attendees = (ev.attendees||[]).filter(id=>id!==activeMid);
    ev.rsvp = (ev.rsvp||[]).filter(r=>r.mid!==activeMid);
  });
  save();
  fbDeleteMember(activeMid);
  EV.forEach(ev=>fbSaveEvent(ev));
  closeDrawer('m-ov'); toast('Member deleted'); renderCurrent();
}

// ── MERGE MEMBERS ─────────────────────────────────────────────────────
// ── MULTI-SELECT DELETE ──────────────────────────────────────────────
let selectMode = false;
let selectSelected = [];
function selectAll() {
  const allIds = M.map(m => String(m.id));
  const allSelected = allIds.every(id => selectSelected.includes(id));
  selectSelected = allSelected ? [] : [...allIds];
  const txt = document.getElementById('select-bar-text');
  const allBtn = document.getElementById('select-all-btn');
  if (txt) txt.textContent = selectSelected.length + ' selected';
  if (allBtn) allBtn.textContent = allSelected ? 'Select all' : 'Deselect all';
  const bar = document.getElementById('select-bar');
  if (bar) bar.classList.toggle('on', selectSelected.length > 0);
  renderMembers();
}
function toggleSelectMode() {
  selectMode = !selectMode;
  selectSelected = [];
  const btn = document.getElementById('select-mode-btn');
  const allBtn = document.getElementById('select-all-btn');
  const bar = document.getElementById('select-bar');
  if (btn) { btn.textContent = selectMode ? 'Cancel' : 'Select'; btn.style.color = selectMode ? 'var(--r)' : ''; }
  if (allBtn) { allBtn.style.display = selectMode ? 'inline-flex' : 'none'; allBtn.textContent = 'Select all'; }
  if (bar) bar.classList.toggle('on', false);
  if (selectMode && mergeMode) toggleMergeMode();
  renderMembers();
}
function toggleSelectItem(id) {
  if (!selectMode) return;
  const i = selectSelected.indexOf(String(id));
  if (i > -1) selectSelected.splice(i, 1);
  else selectSelected.push(String(id));
  const bar = document.getElementById('select-bar');
  const txt = document.getElementById('select-bar-text');
  if (bar) bar.classList.toggle('on', selectSelected.length > 0);
  if (txt) txt.textContent = `${selectSelected.length} selected`;
  renderMembers();
}
async function deleteSelected() {
  if (!selectSelected.length) return;
  const names = selectSelected.map(id => { const m = M.find(x => String(x.id) === id); return m ? m.fn + ' ' + m.ln : id; }).join(', ');
  if (!confirm(`Delete ${selectSelected.length} member${selectSelected.length > 1 ? 's' : ''}?

${names}

This cannot be undone.`)) return;
  for (const id of selectSelected) {
    M = M.filter(x => String(x.id) !== id);
    EV.forEach(ev => {
      ev.attendees = (ev.attendees || []).filter(a => String(a) !== id);
      ev.rsvp = (ev.rsvp || []).filter(r => String(r.mid) !== id);
    });
    fbDeleteMember(id);
  }
  EV.forEach(ev => fbSaveEvent(ev));
  save();
  selectSelected = []; selectMode = false;
  const btn = document.getElementById('select-mode-btn');
  const bar = document.getElementById('select-bar');
  if (btn) { btn.textContent = 'Select'; btn.style.color = ''; }
  if (bar) bar.classList.remove('on');
  toast(`${selectSelected.length === 0 ? 'Members' : selectSelected.length + ' members'} deleted`);
  renderCurrent();
}

let mergeMode = false;
let mergeSelected = [];
function toggleMergeMode() {
  mergeMode = !mergeMode;
  mergeSelected = [];
  document.getElementById('merge-mode-btn').textContent = mergeMode ? 'Cancel merge' : 'Merge';
  document.getElementById('merge-mode-btn').style.color = mergeMode ? 'var(--r)' : '';
  document.getElementById('merge-bar').classList.toggle('on', false);
  renderMembers();
}
function toggleMergeSelect(id) {
  if (!mergeMode) return;
  const i = mergeSelected.indexOf(id);
  if (i > -1) mergeSelected.splice(i,1);
  else if (mergeSelected.length < 2) mergeSelected.push(id);
  const bar = document.getElementById('merge-bar');
  const txt = document.getElementById('merge-bar-text');
  if (mergeSelected.length === 0) { bar.classList.remove('on'); txt.textContent = 'Select 2 people to merge'; }
  else if (mergeSelected.length === 1) { bar.classList.add('on'); txt.textContent = '1 selected — pick one more'; }
  else { bar.classList.add('on'); txt.textContent = 'Ready to merge'; }
  renderMembers();
}
async function doMerge() {
  if (mergeSelected.length !== 2) return;
  const [a, b] = mergeSelected.map(id => M.find(x=>x.id===id));
  if (!a||!b) return;
  // Keep a, merge b into a
  const keepNames = confirm(`Keep "${a.fn} ${a.ln}" as the main profile? (Cancel to keep "${b.fn} ${b.ln}" instead)`);
  const keep = keepNames ? a : b;
  const drop = keepNames ? b : a;
  // Merge tags, notes, contact info (prefer keep, fall back to drop)
  keep.tags = [...new Set([...(keep.tags||[]),...(drop.tags||[])])];
  keep.ph = keep.ph || drop.ph;
  keep.em = keep.em || drop.em;
  keep.bairro = keep.bairro || drop.bairro;
  keep.age = keep.age || drop.age;
  keep.notes = [keep.notes, drop.notes].filter(Boolean).join(' | ').trim();
  // Move all events from drop → keep
  EV.forEach(ev => {
    const hadRSVP = (ev.rsvp||[]).find(r=>String(r.mid)===String(drop.id));
    const hadAtt = (ev.attendees||[]).includes(drop.id);
    if (hadRSVP && !(ev.rsvp||[]).find(r=>String(r.mid)===String(keep.id))) {
      if (!ev.rsvp) ev.rsvp=[];
      ev.rsvp.push({mid:keep.id,status:hadRSVP.status});
    }
    if (hadAtt && !(ev.attendees||[]).map(String).includes(String(keep.id))) {
      if (!ev.attendees) ev.attendees=[];
      ev.attendees.push(keep.id);
    }
    ev.rsvp = (ev.rsvp||[]).filter(r=>r.mid!==drop.id);
    ev.attendees = (ev.attendees||[]).filter(id=>id!==drop.id);
    fbSaveEvent(ev);
  });
  M = M.filter(x=>x.id!==drop.id);
  fbSaveMember(keep);
  fbDeleteMember(drop.id);
  save();
  mergeMode = false; mergeSelected = [];
  document.getElementById('merge-mode-btn').textContent = 'Merge';
  document.getElementById('merge-mode-btn').style.color = '';
  document.getElementById('merge-bar').classList.remove('on');
  toast(`${drop.fn} ${drop.ln} merged into ${keep.fn} ${keep.ln}`);
  renderCurrent();
}

load();
applyStrings();
renderHome();

setTimeout(() => { const sp = document.getElementById('splash'); sp.classList.add('gone'); setTimeout(() => sp.remove(), 900); }, 1600);

// ── EXPOSE TO WINDOW (required because this is a module script) ──────
// onclick attributes in HTML can't reach module-scoped functions without this
Object.assign(window, {
  nav, setBN, openImport, openImportForEvent, openModal, closeModal, mayCloseModal,
  toggleSelectMode, toggleSelectItem, deleteSelected, selectAll,
  openDrawer, closeDrawer, mayCloseDrawer, openMemberDrawer, openEventDrawer,
  mDwTab, evDwTab, mfilt, filterByTag,
  addMember, addEvent, addMemberToEvent, addPersonToEvent,
  editMember, saveMemberEdit, deleteMember,
  toggleMergeMode, toggleMergeSelect, doMerge, deleteEvent,
  renderEvBody,
  handleTagKey, addTagToField, renderAmTags, renderEmTags,
  toggleAttendance, toggleSelectAll, cycleRSVP,
  saveNotes, saveImport, saveNotes,
  renderImpStep, parseCSV, handleFile, setupDrop,
  reviewRow, updName, updF, delRow, removeRTag, addRTag, rerenderRTags,
  copyCode: (btn) => {
    const pre = btn.nextElementSibling;
    navigator.clipboard.writeText(pre.textContent).then(() => {
      btn.textContent = '✓ Copied';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }
});
