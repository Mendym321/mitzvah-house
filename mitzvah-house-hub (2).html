<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Mitzvah House Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --terra:#C9705A;--terra-d:#b05c47;--terra-l:#FAF0EC;--terra-m:#E8C4B8;
  --navy:#2D4B73;--navy-l:#EEF2F7;--navy-m:#B8CCE0;
  --bg:#FAF7F2;--bg2:#F5F0E8;--bg3:#EDE5D8;
  --line:#E8E0D5;--line2:#F0E8E0;
  --ink:#1A1410;--ink2:#4A3F36;--ink3:#8C7B6E;--ink4:#B8A898;
  --white:#fff;--green:#2d7a4f;--green-l:#EDF7F1;
  --serif:'Fraunces',Georgia,serif;--sans:'DM Sans',-apple-system,sans-serif;
  --r:12px;--r2:18px;
  --sh:0 1px 3px rgba(26,20,16,.06),0 1px 2px rgba(26,20,16,.04);
  --sh2:0 8px 32px rgba(26,20,16,.1),0 2px 8px rgba(26,20,16,.06);
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden;}
#app{display:flex;height:100vh;}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .7s ease;}
#loader.out{opacity:0;pointer-events:none;}
.lf{animation:lfa 2s ease-in-out infinite;}
@keyframes lfa{0%,100%{transform:scale(1) rotate(-1deg)}40%{transform:scale(1.06) rotate(1.5deg)}70%{transform:scale(.97) rotate(-.5deg)}}
.ln{font-family:var(--serif);font-size:28px;font-weight:700;color:var(--bg);margin-top:18px;letter-spacing:.01em;}
.ln em{color:var(--terra-m);font-style:italic;}
.ls{font-size:10px;color:rgba(255,255,255,.25);margin-top:5px;text-transform:uppercase;letter-spacing:.14em;}
.lb{width:100px;height:1.5px;background:rgba(255,255,255,.08);border-radius:1px;margin-top:24px;overflow:hidden;}
.lp{height:100%;background:var(--terra-m);animation:lpr 1.5s ease forwards;}
@keyframes lpr{from{width:0}to{width:100%}}

/* ── SIDEBAR ── */
#sb{width:220px;min-width:220px;background:var(--bg);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100vh;}
.sb-top{padding:22px 20px 16px;border-bottom:1px solid var(--line);}
.sb-name{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--ink);line-height:1.15;margin-bottom:2px;}
.sb-name em{color:var(--terra);font-style:italic;}
.sb-sub{font-size:10px;color:var(--ink4);text-transform:uppercase;letter-spacing:.1em;}
.sb-nav{flex:1;padding:10px 10px;overflow-y:auto;}
.sni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;cursor:pointer;font-size:13.5px;font-weight:500;color:var(--ink3);transition:all .13s;margin-bottom:1px;user-select:none;}
.sni:hover{background:var(--line2);color:var(--ink2);}
.sni.on{background:var(--terra-l);color:var(--terra);font-weight:600;}
.sni svg{width:15px;height:15px;flex-shrink:0;opacity:.7;}
.sni.on svg{opacity:1;}
.sni .cnt{margin-left:auto;font-size:11px;color:var(--ink4);}
.sb-foot{padding:14px 18px;border-top:1px solid var(--line);}
.lang-toggle{display:flex;gap:3px;background:var(--bg3);border-radius:20px;padding:3px;margin-bottom:10px;}
.lt{flex:1;padding:4px 0;border-radius:16px;border:none;background:none;font-family:var(--sans);font-size:11px;font-weight:600;color:var(--ink3);cursor:pointer;transition:all .13s;text-align:center;}
.lt.on{background:var(--terra);color:#fff;}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{height:52px;background:var(--white);border-bottom:1px solid var(--line);padding:0 22px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tb-title{font-family:var(--serif);font-size:17px;font-weight:500;flex:1;color:var(--ink);}
.tb-ham{display:none;width:32px;height:32px;border:none;background:none;cursor:pointer;align-items:center;justify-content:center;color:var(--ink3);border-radius:8px;}
#ct{flex:1;overflow-y:auto;overflow-x:hidden;}
#ct::-webkit-scrollbar{width:4px;}
#ct::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}
.panel{display:none;}.panel.on{display:block;animation:pu .22s ease;}
@keyframes pu{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── COMMON ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:30px;border:none;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:600;transition:all .13s;white-space:nowrap;letter-spacing:.01em;}
.btn-terra{background:var(--terra);color:#fff;}.btn-terra:hover{background:var(--terra-d);}
.btn-ink{background:var(--ink);color:var(--bg);}.btn-ink:hover{background:var(--ink2);}
.btn-ghost{background:transparent;color:var(--ink3);border:1.5px solid var(--line);}.btn-ghost:hover{background:var(--bg2);border-color:var(--bg3);}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{filter:brightness(1.05);}
.btn:active{transform:scale(.97);}
.btn svg{width:13px;height:13px;}
.fi{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:var(--r);font-family:var(--sans);font-size:14px;color:var(--ink);outline:none;background:var(--white);transition:border .13s;}
.fi:focus{border-color:var(--terra);}
select.fi{cursor:pointer;}textarea.fi{resize:none;line-height:1.65;}
.fi::placeholder{color:var(--ink4);}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.fl{font-size:12px;font-weight:600;color:var(--ink3);}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px;}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── TAGS ── */
.tpill{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.tags-field{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:8px 10px;border:1.5px solid var(--line);border-radius:var(--r);background:var(--white);cursor:text;min-height:42px;transition:border .13s;}
.tags-field:focus-within{border-color:var(--terra);}
.tag-input{border:none;outline:none;font-family:var(--sans);font-size:13px;color:var(--ink);background:none;min-width:80px;flex:1;}
.tag-sug{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.tsi{font-size:12px;padding:4px 11px;border-radius:20px;border:1px dashed var(--line);color:var(--ink4);cursor:pointer;transition:all .12s;font-family:var(--sans);}
.tsi:hover{border-color:var(--terra);color:var(--terra);background:var(--terra-l);}

/* ── HOME ── */
.home-hero{padding:30px 24px 22px;position:relative;overflow:hidden;}
.home-hero::after{content:'';position:absolute;top:-40px;right:-40px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,var(--terra-l) 0%,transparent 70%);pointer-events:none;}
.h-date{font-size:11px;color:var(--ink4);font-weight:500;letter-spacing:.04em;margin-bottom:8px;}
.h-heading{font-family:var(--serif);font-size:38px;font-weight:700;color:var(--ink);line-height:1.1;margin-bottom:8px;}
.h-heading em{color:var(--terra);font-style:italic;}
.h-sub{font-size:14px;color:var(--ink3);line-height:1.65;}
.h-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;padding:0 24px 20px;}
.hstat{padding:16px 0;border-right:1px solid var(--line2);}
.hstat:last-child{border-right:none;}
.hstat-n{font-family:var(--serif);font-size:42px;font-weight:700;color:var(--terra);line-height:1;}
.hstat-l{font-size:11px;color:var(--ink4);font-weight:500;margin-top:3px;}
.divider{height:1px;background:var(--line2);margin:0 24px 20px;}
.sec-hd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;padding:0 24px;}
.sec-title{font-family:var(--serif);font-size:17px;font-weight:500;color:var(--ink);}
.sec-link{font-size:12.5px;color:var(--terra);font-weight:600;cursor:pointer;}
.sec-link:hover{text-decoration:underline;}

/* IMPORT LAUNCHPAD */
.launch-wrap{padding:0 24px 20px;}
.launch-title{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--ink);margin-bottom:5px;}
.launch-sub{font-size:13.5px;color:var(--ink3);line-height:1.65;margin-bottom:18px;}
.launch-primary{display:flex;align-items:center;gap:14px;background:var(--ink);border-radius:16px;padding:18px 20px;cursor:pointer;margin-bottom:10px;transition:all .15s;}
.launch-primary:hover{background:var(--ink2);}
.launch-primary-icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.launch-primary-title{font-family:var(--serif);font-size:16px;font-weight:500;color:var(--bg);}
.launch-primary-sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px;}
.launch-primary-arr{margin-left:auto;color:rgba(255,255,255,.3);font-size:20px;}
.launch-secondary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.launch-sec-opt{background:var(--white);border:1.5px solid var(--line);border-radius:13px;padding:14px 16px;cursor:pointer;transition:all .15s;}
.launch-sec-opt:hover{border-color:var(--terra-m);background:var(--terra-l);}
.launch-sec-icon{font-size:20px;margin-bottom:7px;display:block;}
.launch-sec-title{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.launch-sec-sub{font-size:12px;color:var(--ink4);line-height:1.5;}
.launch-manual{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border-radius:10px;cursor:pointer;border:1px solid var(--line2);}
.launch-manual:hover{background:var(--bg3);}
.launch-manual-text{font-size:13px;color:var(--ink3);flex:1;}

/* EV SCROLL */
.ev-scroll{display:flex;gap:12px;padding:0 24px 22px;overflow-x:auto;}
.ev-scroll::-webkit-scrollbar{height:0;}
.ev-card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:16px;min-width:186px;cursor:pointer;transition:all .15s;flex-shrink:0;}
.ev-card:hover{transform:translateY(-2px);box-shadow:var(--sh2);border-color:var(--terra-m);}
.ev-card-dt{font-size:10.5px;font-weight:600;color:var(--ink4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.ev-card-nm{font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink);margin-bottom:8px;line-height:1.3;}
.ev-card-cnt{font-size:12.5px;font-weight:600;color:var(--terra);}
.ev-card-bar{height:2px;background:var(--terra);border-radius:1px;margin-bottom:12px;opacity:.35;}

/* ACTIVITY */
.act-row{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--line2);}
.act-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.act-text{flex:1;font-size:13.5px;color:var(--ink2);line-height:1.5;}
.act-time{font-size:11.5px;color:var(--ink4);}

/* TIP */
.tip-strip{margin:0 24px 18px;background:var(--navy-l);border:1px solid var(--navy-m);border-radius:13px;padding:13px 16px;display:flex;gap:11px;align-items:flex-start;}
.tip-dismiss{font-size:12px;color:var(--navy);font-weight:600;cursor:pointer;opacity:.7;margin-top:6px;display:inline-block;}
.tip-dismiss:hover{opacity:1;}

/* EVENTS */
.ev-list-hd{padding:10px 24px 6px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink4);}
.ev-row{display:flex;align-items:center;gap:14px;padding:14px 24px;background:var(--white);border-bottom:1px solid var(--line2);cursor:pointer;transition:background .1s;position:relative;}
.ev-row:hover{background:var(--terra-l);}
.ev-row::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2.5px;background:var(--terra);border-radius:0 2px 2px 0;opacity:0;transition:opacity .13s;}
.ev-row:hover::before{opacity:1;}
.ev-datebox{width:42px;height:42px;border:1.5px solid var(--line);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg);}
.ev-mo{font-size:8px;text-transform:uppercase;color:var(--ink4);font-weight:700;letter-spacing:.04em;}
.ev-d{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--ink);line-height:1;}
.ev-info{flex:1;min-width:0;}
.ev-nm{font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink);}
.ev-meta{font-size:12px;color:var(--ink3);margin-top:2px;}
.ev-cnt{text-align:right;flex-shrink:0;}
.ev-cnt-n{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--terra);}
.ev-cnt-l{font-size:10px;color:var(--ink4);}

/* MEMBERS */
.filter-bar{padding:10px 16px;background:var(--white);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;flex-wrap:wrap;position:sticky;top:0;z-index:5;}
.fb{padding:5px 13px;border-radius:20px;border:1.5px solid var(--line);background:var(--white);font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--ink3);cursor:pointer;transition:all .12s;}
.fb.on{background:var(--terra);color:#fff;border-color:var(--terra);}
.srch{flex:1;max-width:180px;padding:6px 12px;border:1.5px solid var(--line);border-radius:20px;font-family:var(--sans);font-size:13px;color:var(--ink);outline:none;background:var(--white);}
.srch:focus{border-color:var(--terra);}
.mrow{display:flex;align-items:center;gap:13px;padding:13px 24px;background:var(--white);border-bottom:1px solid var(--line2);cursor:pointer;transition:background .1s;position:relative;}
.mrow:hover{background:var(--terra-l);}
.mrow::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:2.5px;background:var(--terra);border-radius:0 2px 2px 0;opacity:0;transition:opacity .13s;}
.mrow:hover::before{opacity:1;}
.mr-name{font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink);margin-bottom:3px;}
.mr-meta{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.att-dots{display:flex;gap:3px;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-on{background:var(--terra);}
.dot-off{background:var(--line);}

/* ANALYTICS */
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:20px 24px;}
.an-card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:18px;}
.an-title{font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink);margin-bottom:14px;}
.bar-wrap{display:flex;flex-direction:column;gap:10px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-lbl{font-size:12px;color:var(--ink3);min-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.bar-val{font-size:12px;font-weight:600;color:var(--ink2);min-width:22px;text-align:right;}

/* DETAIL PANEL */
.ov{position:fixed;inset:0;background:rgba(26,20,16,.18);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.on{opacity:1;pointer-events:all;}
.dp{position:absolute;right:0;top:0;bottom:0;width:440px;max-width:100vw;background:var(--white);border-left:1px solid var(--line);display:flex;flex-direction:column;transform:translateX(110%);transition:transform .25s cubic-bezier(.32,.72,0,1);box-shadow:var(--sh2);}
.ov.on .dp{transform:translateX(0);}
.dp-hero{padding:20px 20px 0;border-bottom:1px solid var(--line);flex-shrink:0;background:linear-gradient(160deg,var(--terra-l) 0%,var(--white) 60%);}
.dp-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.dp-name{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--ink);line-height:1.2;}
.dp-meta{font-size:12.5px;color:var(--ink3);margin-top:3px;}
.dp-x{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink4);}
.dp-x:hover{background:var(--bg2);}
.dp-x svg{width:10px;height:10px;}
.dp-tabs{display:flex;}
.dpt{padding:9px 14px;font-size:13px;font-weight:600;color:var(--ink4);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;}
.dpt.on{color:var(--terra);border-bottom-color:var(--terra);}
.dp-body{flex:1;overflow-y:auto;padding:18px 20px;}
.dp-body::-webkit-scrollbar{width:3px;}
.dp-body::-webkit-scrollbar-thumb{background:var(--line);}
.dp-foot{padding:13px 20px;border-top:1px solid var(--line);display:flex;gap:7px;flex-shrink:0;}
.dp-foot .btn{flex:1;}
.ds{margin-bottom:20px;}
.ds-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink4);margin-bottom:9px;}
.ir{display:flex;gap:8px;margin-bottom:8px;align-items:baseline;}
.irl{font-size:13px;color:var(--ink4);min-width:90px;flex-shrink:0;}
.irv{font-size:13px;color:var(--ink2);}
.tl-item{display:flex;gap:10px;padding-bottom:13px;position:relative;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:5px;top:11px;bottom:0;width:1px;background:var(--line2);}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:2px;border:2px solid var(--terra);background:var(--terra-l);}

/* IMPORT MODAL */
.mo{position:fixed;inset:0;background:rgba(26,20,16,.22);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .16s;}
.mo.on{opacity:1;pointer-events:all;}
.md{background:var(--white);border-radius:22px 22px 0 0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;transform:translateY(14px);transition:transform .2s;padding-bottom:env(safe-area-inset-bottom);}
.mo.on .md{transform:translateY(0);}
.md-h{padding:15px 18px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;}
.md-t{font-family:var(--serif);font-size:17px;font-weight:500;color:var(--ink);}
.md-b{padding:16px 18px 18px;}
.fa{display:flex;justify-content:flex-end;gap:8px;padding-top:12px;border-top:1px solid var(--line);margin-top:4px;}
.handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:12px auto 0;}
.xbtn{width:27px;height:27px;border-radius:50%;background:var(--bg2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);}
.xbtn svg{width:10px;height:10px;}
.csv-ta{width:100%;min-height:110px;padding:12px;background:var(--bg);border:1.5px solid var(--line);border-radius:12px;font-family:monospace;font-size:12.5px;color:var(--ink2);outline:none;resize:vertical;line-height:1.7;}
.csv-ta:focus{border-color:var(--terra);}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--line);border-radius:14px;padding:32px 20px;text-align:center;transition:all .15s;cursor:pointer;background:var(--white);}
.drop-zone:hover,.drop-zone.over{border-color:var(--terra);background:var(--terra-l);}
.dz-icon{font-size:32px;margin-bottom:10px;}
.dz-title{font-family:var(--serif);font-size:16px;font-weight:500;color:var(--ink2);margin-bottom:4px;}
.dz-sub{font-size:13px;color:var(--ink4);line-height:1.6;}

/* REVIEW TABLE */
.rtable{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px;}
.rtable th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink4);border-bottom:1.5px solid var(--line);background:var(--bg);}
.rtable td{padding:7px 10px;border-bottom:1px solid var(--line2);vertical-align:middle;}
.rtable tr:hover td{background:var(--terra-l);}

function addTagToField(tag,pfx='am'){
  if(pfx==='am'){if(!amTags.includes(tag))amTags.push(tag);renderAmTags();}
}
function renderAmTags(){
  const field=document.getElementById('am-tags-field');
  const inp=document.getElementById('am-tag-in');
  if(!field||!inp)return;
  field.querySelectorAll('.tpill').forEach(p=>p.remove());
  amTags.forEach(tag=>{
    const s=document.createElement('span');
    const c=tc(tag);
    s.className='tpill';
    s.style.cssText=`background:${c}15;color:${c};border:1px solid ${c}30;cursor:pointer;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;`;
    s.innerHTML=`${tag} <span style="opacity:.6">×</span>`;
    s.onclick=()=>{amTags=amTags.filter(x=>x!==tag);renderAmTags();};
    field.insertBefore(s,inp);
  });
  // suggestions — existing tags only, user-created
  const existing=allTags().filter(tg=>!amTags.includes(tg)).slice(0,6);
  const sug=document.getElementById('am-tag-sug');
  if(sug)sug.innerHTML=existing.map(tg=>`<span class="tsi" onclick="addTagToField('${tg.replace(/'/g,"\\'")}','am')">${tg}</span>`).join('');
}

// ── SMART PARSER ──
function parseCSV(raw){
  if(!raw?.trim()){toast(lang==='pt'?'Cole os dados primeiro':'Paste data first');return;}
  const lines=raw.trim().split(/\r?\n/).filter(Boolean);
  if(lines.length<2){toast(lang==='pt'?'Dados insuficientes':'Not enough data');return;}
  const headers=splitL(lines[0]);
  const rows=lines.slice(1).map(splitL);
  const map={};
  const m=(hl,keys)=>keys.some(k=>hl.includes(k));
  headers.forEach((h,i)=>{
    const hl=h.toLowerCase().trim();
    if(map.fullname==null&&m(hl,['name','nome','full','participant','attendee','inscrito']))map.fullname=i;
    if(map.fname==null&&(hl==='first name'||hl==='nome'||hl==='primeiro nome'||hl==='first'))map.fname=i;
    if(map.lname==null&&(hl==='last name'||hl==='sobrenome'||hl==='surname'||hl==='last'))map.lname=i;
    if(map.age==null&&m(hl,['age','idade','anos']))map.age=i;
    if(map.phone==null&&m(hl,['phone','tel','whatsapp','celular','mobile','fone']))map.phone=i;
    if(map.email==null&&m(hl,['email','e-mail','mail','correio']))map.email=i;
    if(map.hood==null&&m(hl,['neighborhood','bairro','district','cidade','city','region','região']))map.hood=i;
  });
  const people=rows.map(row=>{
    if(row.every(c=>!c?.trim()))return null;
    let fn='',ln='';
    if(map.fullname!=null){const pts=(row[map.fullname]||'').trim().split(/\s+/);fn=pts[0]||'';ln=pts.slice(1).join(' ');}
    if(map.fname!=null)fn=(row[map.fname]||'').trim()||fn;
    if(map.lname!=null)ln=(row[map.lname]||'').trim()||ln;
    if(!fn&&!ln)return null;
    const existing=M.find(m=>m.fn.toLowerCase()===fn.toLowerCase()&&m.ln.toLowerCase()===ln.toLowerCase());
    return{fn,ln,age:parseInt(row[map.age])||null,ph:(row[map.phone]||'').trim(),em:(row[map.email]||'').trim(),bairro:(row[map.hood]||'').trim(),
      tags:[], // ← NO auto-tags. User assigns tags in review screen.
      is_new:!existing,eid:existing?.id};
  }).filter(Boolean);
  if(!people.length){toast(lang==='pt'?'Nenhuma pessoa encontrada':'No people found');return;}
  importParsed=people;
  renderReview(map,headers);
}
function splitL(line){const r=[];let c='',q=false;for(const ch of line){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;}

    </table>
    </div>

    </div>`;
  if(importEvId){const s=document.getElementById('imp-ev-sel2');if(s)s.value=importEvId;}
}
function rrow(p,i){
  const tagHtml=(p.tags||[]).map(tag=>tpillHTML(tag,true,i)).join('');
  return`<tr class="${p.is_new?'rn':'re'}">
    <td><div style="display:flex;flex-direction:column;gap:3px">
      <input class="ri" value="${p.fn} ${p.ln}" onblur="updName(${i},this.value)">
      <span class="rbadge ${p.is_new?'n':'e'}">${p.is_new?t('newBadge'):t('existsBadge')}</span>
    </div></td>
    <td><input class="ri" value="${p.age||''}" onblur="updF(${i},'age',this.value)" style="width:50px"></td>
    <td><input class="ri" value="${p.bairro||''}" onblur="updF(${i},'bairro',this.value)"></td>
    <td><div class="rtags" id="rtags-${i}">${tagHtml}<span class="radd" onclick="addRTag(${i})">+ tag</span></div></td>
    <td><button class="rdel" onclick="delRRow(${i})">×</button></td>
  </tr>`;
}
function updName(i,v){if(!importParsed[i])return;const pts=v.trim().split(/\s+/);importParsed[i].fn=pts[0]||'';importParsed[i].ln=pts.slice(1).join(' ')||'';}
function updF(i,f,v){if(!importParsed[i])return;importParsed[i][f]=f==='age'?parseInt(v)||null:v;}
function delRRow(i){importParsed.splice(i,1);const tb=document.getElementById('rtbody');if(tb)tb.innerHTML=importParsed.map((p,j)=>rrow(p,j)).join('');}
function removeRTag(i,tag){if(!importParsed[i])return;importParsed[i].tags=(importParsed[i].tags||[]).filter(t=>t!==tag);rerenderRTags(i);}
function addRTag(i){const tag=prompt(lang==='pt'?'Nome da tag:':'Tag name:');if(!tag?.trim())return;if(!importParsed[i].tags)importParsed[i].tags=[];if(!importParsed[i].tags.includes(tag.trim()))importParsed[i].tags.push(tag.trim());rerenderRTags(i);}
function rerenderRTags(i){const cell=document.getElementById(`rtags-${i}`);if(cell){cell.innerHTML=(importParsed[i].tags||[]).map(tag=>tpillHTML(tag,true,i)).join('')+`<span class="radd" onclick="addRTag(${i})">+ tag</span>`;}}

function saveImport(){
  let added=0;
  const evId=parseInt(document.getElementById('imp-ev-sel2')?.value)||importEvId||null;
  const ev=evId?EV.find(e=>e.id===evId):null;
  importParsed.forEach(p=>{
    if(!p.is_new){
      if(ev&&!ev.rsvp?.find(r=>r.mid===p.eid)){if(!ev.rsvp)ev.rsvp=[];ev.rsvp.push({mid:p.eid,status:'confirmed'});}
      if(p.eid&&p.tags?.length){const em=M.find(x=>x.id===p.eid);if(em)em.tags=[...new Set([...(em.tags||[]),...p.tags])];}
      return;
    }
    const nm={id:Date.now()+added,fn:p.fn,ln:p.ln,age:p.age,tags:p.tags||[],ph:p.ph,em:p.em,bairro:p.bairro,notes:'',joined:tod(),attendees:[]};
    M.push(nm);
    if(ev){if(!ev.rsvp)ev.rsvp=[];ev.rsvp.push({mid:nm.id,status:'confirmed'});}
    added++;
  });
  sv();upB();closeM('impm');importParsed=[];importEvId=null;
  toast(`${added} ${lang==='pt'?'novos membros adicionados':'new members added'}!`);
  renderCurrent();
}

    const conf=rsvp.filter(r=>r.status==='confirmed'),pend=rsvp.filter(r=>r.status==='pending');
    document.getElementById('ev-body').innerHTML=`
      <div style="display:flex;gap:9px;margin-bottom:14px">
        <div style="flex:1;background:var(--green-l);border-radius:10px;padding:12px;text-align:center"><div style="font-family:var(--serif);font-size:24px;font-weight:700;color:var(--green)">${conf.length}</div><div style="font-size:11px;color:var(--green)">${t('confirmed')}</div></div>
        <div style="flex:1;background:#fdf6e7;border-radius:10px;padding:12px;text-align:center"><div style="font-family:var(--serif);font-size:24px;font-weight:700;color:#c47f1a">${pend.length}</div><div style="font-size:11px;color:#c47f1a">${lang==='pt'?'Pendentes':'Pending'}</div></div>
      </div>
      ${[...conf,...pend].map(r=>{const m=M.find(x=>x.id===r.mid);return m?`<div style="display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line2)">
        <div class="av" style="width:32px;height:32px;font-size:12px;background:${abg(m)}">${ini(m)}</div>
        <div style="flex:1"><div style="font-family:var(--serif);font-size:14px;font-weight:500">${m.fn} ${m.ln}</div>
        <div style="display:flex;gap:3px;margin-top:3px;flex-wrap:wrap">${(m.tags||[]).map(tag=>tpillHTML(tag)).join('')}</div></div>
        <div onclick="cycleRSVP(${ev.id},${r.mid})" style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;background:${r.status==='confirmed'?'var(--green-l)':'#fdf6e7'};color:${r.status==='confirmed'?'var(--green)':'#c47f1a'}">${r.status==='confirmed'?'✓':'?'}</div>
      </div>`:'';}).join('')||`<div style="font-size:13px;color:var(--ink4);padding:12px 0">${lang==='pt'?'Sem inscrições.':'No RSVPs yet.'}</div>`}`;
  }else{
    const att=ev.attendees||[];
    document.getElementById('ev-body').innerHTML=att.map(mid=>{const m=M.find(x=>x.id===mid);return m?`<div style="display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line2)"><div class="av" style="width:32px;height:32px;font-size:12px;background:${abg(m)}">${ini(m)}</div><div style="flex:1;font-family:var(--serif);font-size:14px;font-weight:500">${m.fn} ${m.ln}</div><div style="width:24px;height:24px;border-radius:50%;background:var(--green-l);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:11px">✓</div></div>`:'';}).join('')||`<div style="font-size:13px;color:var(--ink4)">${lang==='pt'?'Sem presenças.':'No attendance marked.'}</div>`;}
}
function cycleRSVP(evId,mid){const ev=EV.find(e=>e.id===evId);if(!ev)return;const r=ev.rsvp?.find(x=>x.mid===mid);if(!r)return;r.status=r.status==='confirmed'?'pending':'confirmed';sv();renderEvTab(ev);}
function addToThisEvent(){const ev=EV.find(e=>e.id===activeEvId);if(!ev||!M.length){toast(t('noMembers'));return;}const nm=prompt(lang==='pt'?'Nome do membro:':'Member name:');if(!nm)return;const m=M.find(x=>(x.fn+' '+x.ln).toLowerCase().includes(nm.toLowerCase()));if(!m){toast(lang==='pt'?'Não encontrado':'Not found');return;}if(!ev.rsvp)ev.rsvp=[];if(ev.rsvp.find(r=>r.mid===m.id)){toast(lang==='pt'?'Já está':'Already in list');return;}ev.rsvp.push({mid:m.id,status:'confirmed'});sv();renderEvTab(ev);toast(`${m.fn} added`);}

// ── MEMBERS ──
function renderMembers(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  let list=[...M];
  if(mTagFilt)list=list.filter(m=>(m.tags||[]).includes(mTagFilt));
  if(q)list=list.filter(m=>(m.fn+' '+m.ln+(m.bairro||'')).toLowerCase().includes(q));
  document.getElementById('m-ct').textContent=list.length;
  const tags=allTags();
  document.getElementById('tag-filters').innerHTML=tags.slice(0,6).map(tag=>`<button class="fb ${mTagFilt===tag?'on':''}" onclick="fByTag('${tag.replace(/'/g,"\\'")}')" style="${mTagFilt===tag?`background:${tc(tag)};border-color:${tc(tag)}`:''}">${tag}</button>`).join('');
  const last5=[...EV].sort((a,b)=>b.dt.localeCompare(a.dt)).slice(0,5);
  document.getElementById('m-list').innerHTML=list.length
    ?list.map(m=>{
        const dots=last5.map(e=>`<div class="dot ${e.attendees?.includes(m.id)?'dot-on':'dot-off'}"></div>`).join('');
        const cnt=EV.filter(e=>e.attendees?.includes(m.id)).length;
        return`<div class="mrow" onclick="openMDP(${m.id})">
          <div class="av" style="width:40px;height:40px;font-size:15px;background:${abg(m)}">${ini(m)}</div>
          <div style="flex:1;min-width:0">
            <div class="mr-name">${m.fn} ${m.ln}${m.age?` <span style="font-family:var(--sans);font-size:13px;font-weight:400;color:var(--ink4)">(${m.age})</span>`:''}</div>
            <div class="mr-meta">
              ${(m.tags||[]).map(tag=>tpillHTML(tag)).join('')}
              ${m.bairro?`<span>${m.bairro}</span>`:''}
              ${cnt?`<span>${cnt} ${t('eventsLabel')}</span>`:''}
              <div class="att-dots">${dots}</div>
            </div>
          </div>
        </div>`;
      }).join('')
    :emptyS(t('noMembers'),lang==='pt'?'Importe dados ou adicione manualmente.':'Import or add manually.','impm');
}
function mf(f,el){mFilt=f;mTagFilt=null;document.querySelectorAll('.filter-bar .fb').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.borderColor='';});el.classList.add('on');renderMembers();}
function fByTag(tag){if(mTagFilt===tag){mTagFilt=null;}else{mTagFilt=tag;mFilt='all';}renderMembers();}

// ── MEMBER DETAIL ──
function openMDP(id){
  activeMid=id;activeMTab='info';
  const m=M.find(x=>x.id===id);if(!m)return;
  document.getElementById('m-av').style.background=abg(m);document.getElementById('m-av').textContent=ini(m);
  document.getElementById('m-nm').textContent=m.fn+' '+m.ln;
  const cnt=EV.filter(e=>e.attendees?.includes(m.id)).length;
  document.getElementById('m-mt').textContent=`${m.age?m.age+(lang==='pt'?' anos':' yrs')+' · ':''}${m.bairro?m.bairro+' · ':''}${cnt} ${t('eventsLabel')}`;
  document.querySelectorAll('#m-ov .dpt').forEach((tab,i)=>tab.classList.toggle('on',i===0));
  document.getElementById('m-wa').onclick=()=>{if(m.ph)window.open('https://wa.me/55'+m.ph.replace(/\D/g,''),'_blank');else toast(t('noPhone'));};
  renderMTab(m);document.getElementById('m-ov').classList.add('on');
}
function closeMDP(){document.getElementById('m-ov').classList.remove('on');}
function mayCloseM(e){if(e.target.id==='m-ov')closeMDP();}
function mTab(tab,el){activeMTab=tab;document.querySelectorAll('#m-ov .dpt').forEach(x=>x.classList.remove('on'));el?.classList.add('on');renderMTab(M.find(x=>x.id===activeMid));}
function renderMTab(m){
  if(!m)return;
  const evs=EV.filter(e=>e.attendees?.includes(m.id)).sort((a,b)=>b.dt.localeCompare(a.dt));
  const ir=(l,v)=>`<div class="ir"><div class="irl">${l}</div><div class="irv">${v||'—'}</div></div>`;
  if(activeMTab==='info'){
    document.getElementById('m-body').innerHTML=`
      ${(m.tags||[]).length?`<div class="ds"><div class="ds-t">Tags</div><div style="display:flex;flex-wrap:wrap;gap:5px">${(m.tags||[]).map(tag=>tpillHTML(tag)).join('')}</div></div>`:''}
      <div class="ds"><div class="ds-t">${lang==='pt'?'Contato':'Contact'}</div>
        ${ir('WhatsApp',m.ph?`<a href="https://wa.me/55${m.ph.replace(/\D/g,'')}" target="_blank" style="color:var(--terra)">${m.ph}</a>`:'')}
        ${ir('Email',m.em)}${ir(t('neighborhood'),m.bairro)}
        ${ir(lang==='pt'?'Membro desde':'Member since',m.joined?fd(m.joined):'')}
      </div>
      <div class="ds"><div class="ds-t">${lang==='pt'?'Participação':'Participation'}</div>
        ${ir(t('eventsLabel'),`<strong style="color:var(--terra)">${evs.length}</strong>`)}
        ${ir(lang==='pt'?'Último':'Last event',evs.length?evs[0].nm+' — '+fdS(evs[0].dt):'')}
      </div>`;
  }else if(activeMTab==='history'){
    document.getElementById('m-body').innerHTML=`<div class="ds"><div class="ds-t">${t('historyTab')} · ${evs.length}</div>
      ${evs.length?evs.map(ev=>{const d=new Date(ev.dt+'T12:00:00');return`<div class="tl-item"><div class="tl-dot"></div><div><div style="font-family:var(--serif);font-size:14px;font-weight:500;color:var(--ink)">${ev.nm}</div><div style="font-size:11.5px;color:var(--ink4);margin-top:2px">${isNaN(d)?ev.dt:d.getDate()+' '+MO()[d.getMonth()]+' '+d.getFullYear()}</div></div></div>`;}).join(''):`<div style="font-size:13px;color:var(--ink4)">${t('neverAttended')}</div>`}
    </div>`;
  }else{
    document.getElementById('m-body').innerHTML=`<div class="ds"><div class="ds-t">${t('notesTab')}</div>
      <textarea style="width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:11px;padding:12px;font-family:var(--sans);font-size:14px;color:var(--ink);resize:none;outline:none;min-height:180px;line-height:1.7;transition:border .13s" onfocus="this.style.borderColor='var(--terra)'" onblur="saveNotes(${m.id},this.value)">${m.notes||''}</textarea>
    </div>`;
  }
}
function saveNotes(id,v){const m=M.find(x=>x.id===id);if(m){m.notes=v;sv();}}
function openAddToEvent(){const m=M.find(x=>x.id===activeMid);if(!m)return;const up=upcoming();if(!up.length){toast(t('noEvents'));return;}const nm=prompt(lang==='pt'?'Nome do evento (deixe vazio para o próximo):':'Event name (blank for next):');const ev=nm?EV.find(e=>e.nm.toLowerCase().includes(nm.toLowerCase())):up[0];if(!ev){toast(lang==='pt'?'Não encontrado':'Not found');return;}if(!ev.attendees)ev.attendees=[];if(ev.attendees.includes(m.id)){toast(lang==='pt'?'Já está no evento':'Already in event');return;}ev.attendees.push(m.id);if(!ev.rsvp)ev.rsvp=[];if(!ev.rsvp.find(r=>r.mid===m.id))ev.rsvp.push({mid:m.id,status:'confirmed'});sv();toast(`${m.fn} → ${ev.nm}`);renderMTab(m);}

// ── ADD MEMBER ──
function addMember(){
  const fn=document.getElementById('am-fn').value.trim(),ln=document.getElementById('am-ln').value.trim();
  if(!fn||!ln){toast(lang==='pt'?'Nome obrigatório':'Name required');return;}
  M.push({id:Date.now(),fn,ln,age:parseInt(document.getElementById('am-age').value)||null,tags:[...amTags],ph:document.getElementById('am-ph').value.trim(),em:document.getElementById('am-em').value.trim(),bairro:document.getElementById('am-bairro').value.trim(),notes:document.getElementById('am-notes').value.trim(),joined:tod(),attendees:[]});
  sv();closeM('addm');upB();amTags=[];
  ['am-fn','am-ln','am-age','am-ph','am-em','am-bairro','am-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  toast(t('memberAdded'));renderCurrent();
}

// ── ADD EVENT ──
function addEvent(){
  const nm=document.getElementById('ae-nm').value.trim(),dt=document.getElementById('ae-dt').value;
  if(!nm||!dt){toast(lang==='pt'?'Nome e data obrigatórios':'Name and date required');return;}
  EV.push({id:Date.now(),nm,dt,loc:document.getElementById('ae-loc').value.trim()||'ADD Mitzvah House',desc:document.getElementById('ae-desc').value.trim(),attendees:[],rsvp:[],created:tod()});
  sv();closeM('addev');upB();toast(t('eventCreated'));
  ['ae-nm','ae-dt','ae-loc','ae-desc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  renderCurrent();
}

// ── ANALYTICS ──
function renderAnalytics(){
  const tags=allTags();
  const tagC={};tags.forEach(tag=>{tagC[tag]=M.filter(m=>(m.tags||[]).includes(tag)).length;});
  const topTags=Object.entries(tagC).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxT=topTags[0]?.[1]||1;
  const topAtt=M.map(m=>({m,n:EV.filter(e=>e.attendees?.includes(m.id)).length})).sort((a,b)=>b.n-a.n).slice(0,6);
  const maxA=topAtt[0]?.n||1;
  const bairros={};M.forEach(m=>{if(m.bairro)bairros[m.bairro]=(bairros[m.bairro]||0)+1;});
  const bTop=Object.entries(bairros).sort((a,b)=>b[1]-a[1]).slice(0,6);const maxB=bTop[0]?.[1]||1;
  const evM={};EV.forEach(e=>{if(e.dt){const k=e.dt.slice(0,7);evM[k]=(evM[k]||0)+1;}});
  const evMSorted=Object.entries(evM).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);const maxM=Math.max(...evMSorted.map(x=>x[1]),1);
  const nd=`<div style="font-size:13px;color:var(--ink4);padding:8px 0">${t('noData')}</div>`;
  document.getElementById('an-grid').innerHTML=`
    <div class="an-card"><div class="an-title">${t('byTag')}</div>${topTags.length?`<div class="bar-wrap">${topTags.map(([tag,n])=>`<div class="bar-row"><div class="bar-lbl" style="cursor:pointer;color:${tc(tag)};font-weight:600" onclick="go('members',null);fByTag('${tag.replace(/'/g,"\\'")}')">${tag}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxT*100)}%;background:${tc(tag)}"></div></div><div class="bar-val">${n}</div></div>`).join('')}</div>`:nd}</div>
    <div class="an-card"><div class="an-title">${t('topAttendees')}</div>${topAtt.filter(x=>x.n>0).length?`<div class="bar-wrap">${topAtt.filter(x=>x.n>0).map(({m,n})=>`<div class="bar-row"><div class="bar-lbl" style="cursor:pointer" onclick="openMDP(${m.id})">${m.fn} ${m.ln.charAt(0)}.</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxA*100)}%;background:var(--terra)"></div></div><div class="bar-val">${n}</div></div>`).join('')}</div>`:nd}</div>
    <div class="an-card"><div class="an-title">${t('byNeighborhood')}</div>${bTop.length?`<div class="bar-wrap">${bTop.map(([b,n])=>`<div class="bar-row"><div class="bar-lbl">${b}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxB*100)}%;background:var(--navy)"></div></div><div class="bar-val">${n}</div></div>`).join('')}</div>`:nd}</div>
    <div class="an-card"><div class="an-title">${t('eventGrowth')}</div>${evMSorted.length?`<div class="bar-wrap">${evMSorted.map(([mo,n])=>`<div class="bar-row"><div class="bar-lbl">${mo.slice(5)}/${mo.slice(2,4)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxM*100)}%;background:var(--green)"></div></div><div class="bar-val">${n}</div></div>`).join('')}</div>`:nd}</div>`;
}

// ── HELPERS ──
function emptyS(title,sub,btn){return`<div class="empty"><div class="empty-icon">✦</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div><button class="btn btn-terra" onclick="${btn==='impm'?"openImp()":"openM('"+btn+"')"}">${btn==='impm'?t('import'):'+ '+t('newEvent')}</button></div>`;}
function openM(id){document.getElementById(id)?.classList.add('on');if(id==='addm'){amTags=[];setTimeout(()=>{renderAmTags();applyT();},30);}}
function closeM(id){document.getElementById(id)?.classList.remove('on');}
document.querySelectorAll('.mo').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('on');}));
function toast(msg,dur=2600){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),dur);}

// ── INIT ──
load();applyT();renderHome();upB();
setTimeout(()=>{const l=document.getElementById('loader');l.classList.add('out');setTimeout(()=>l.remove(),700);},1400);
</script>
</body>
</html>
